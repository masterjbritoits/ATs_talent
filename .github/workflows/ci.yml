name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────
  # Lint & type-check
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint . --max-warnings 0 || true

      - name: TypeScript
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────
  # Unit tests
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose

  # ─────────────────────────────────────────────────────────
  # Build + Prisma validate
  # ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Minimal env to satisfy Next.js build
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/atsdb"
      DIRECT_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/atsdb"
      SESSION_SECRET: "ci-build-placeholder-secret-32bytes"
      NODE_ENV: "production"
      NEXT_OUTPUT: "standalone"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Next.js build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # Deploy to Azure App Service (main branch only)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Build (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NODE_ENV: production
          NEXT_OUTPUT: standalone
          APP_VERSION: ${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_SERVICE_NAME }}
          package: .next/standalone
